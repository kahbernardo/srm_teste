apiVersion: v1
kind: Secret
metadata:
  name: srm-secrets
  namespace: srm-credit-engine
type: Opaque
stringData:
  postgres-password: srm_password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: srm-credit-engine
data:
  NODE_ENV: production
  PORT: "4000"
  HOST: "0.0.0.0"
  LOG_LEVEL: info
  ALLOWED_ORIGINS: "http://localhost:3000"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: srm-credit-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: srm-credit-engine/backend:1.0.0
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DATABASE_URL
              value: postgresql://srm_user:srm_password@postgres:5432/srm_credit_engine?schema=public
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: srm-credit-engine
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: srm-credit-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
